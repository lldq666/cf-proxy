name = "cf-proxy"
compatibility_date = "2024-09-01"
main = "_worker.js"

# 部署到 Workers:
#   npx wrangler deploy
#
# 部署到 Pages:
#   将本仓库连接到 Cloudflare Pages，构建命令留空，输出目录为根目录
#
# 自定义域名请在 Cloudflare Dashboard 中配置:
#   Workers → 你的 Worker → 设置 → 触发器 → 自定义域
#   Pages   → 你的项目  → 自定义域

# ============================================================
# 环境变量配置 (可选)
# 未设置时使用内置默认值，开箱即用
# ============================================================

# 额外添加的白名单域名 (逗号分隔，会与默认白名单合并)
# 示例: ALLOWED_HOSTS = "myregistry.com,gitlab.mycompany.com"
# [vars]
# ALLOWED_HOSTS = ""

# 最大重定向跟随次数 (默认 5)
# [vars]
# MAX_REDIRECTS = "5"

# ============================================================
# 可观测性配置
# 启用 Workers 日志和追踪, 用于在 Cloudflare Dashboard
# 中查看 Worker 执行的详细日志和追踪信息
# ============================================================
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
